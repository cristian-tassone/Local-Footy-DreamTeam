<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HTML Phone Viewer</title>
  <style>
    :root { --phone-width: 440; --phone-height: 956; }
    * { box-sizing: border-box; }
    html, body { width:100%; height:100%; margin:0; overflow:hidden; background:#f3f3f3; font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
    #stage { position:fixed; inset:0; display:grid; place-items:center; overflow:hidden; padding:24px; }
    #phoneViewport { width:calc(var(--phone-width)*1px); height:calc(var(--phone-height)*1px); transform-origin:center center; background:#fff; overflow:hidden; }
    #preview { width:100%; height:100%; border:0; display:block; background:#fff; }
    #controls { position:fixed; left:14px; bottom:14px; z-index:10; display:grid; gap:10px; }
    #refreshBtn, #openBtn, #dropbox { width:128px; border:1px dashed rgba(255,255,255,.65); border-radius:14px; background:rgba(0,0,0,.58); color:rgba(255,255,255,.92); display:grid; place-items:center; font-weight:800; letter-spacing:.01em; cursor:pointer; user-select:none; backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); transition:transform 140ms ease,background 140ms ease,border-color 140ms ease,opacity 140ms ease; font-family:inherit; }
    #refreshBtn { height:76px; font-size:16px; border-style:solid; }
    #openBtn, #dropbox { height:44px; font-size:12px; }
    #refreshBtn:hover, #openBtn:hover, #dropbox:hover, #dropbox.dragging { transform:translateY(-1px); background:rgba(0,0,0,.72); border-color:rgba(255,255,255,.95); }
    #refreshBtn:disabled { opacity:.42; cursor:not-allowed; transform:none; }
    #fileInput { display:none; }
  </style>
</head>
<body>
  <div id="stage"><div id="phoneViewport"><iframe id="preview" title="HTML preview" sandbox="allow-scripts allow-forms allow-modals allow-pointer-lock allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-downloads"></iframe></div></div>
  <div id="controls"><button id="refreshBtn" type="button" disabled>Refresh</button><button id="openBtn" type="button">Open HTML</button><label id="dropbox" for="fileInput">Drop HTML</label></div>
  <input id="fileInput" type="file" accept=".html,.htm,text/html" />

  <script>
    const PHONE_WIDTH = 440, PHONE_HEIGHT = 956;
    const preview = document.getElementById('preview');
    const phoneViewport = document.getElementById('phoneViewport');
    const dropbox = document.getElementById('dropbox');
    const fileInput = document.getElementById('fileInput');
    const refreshBtn = document.getElementById('refreshBtn');
    const openBtn = document.getElementById('openBtn');
    let lastFile = null;
    let liveFileHandle = null;

    function fitPhoneViewport(){
      const padding=24;
      const scale=Math.min((window.innerWidth-padding*2)/PHONE_WIDTH,(window.innerHeight-padding*2)/PHONE_HEIGHT,1);
      phoneViewport.style.transform=`scale(${scale})`;
    }

    function injectFillCode(sourceHtml){
      const fillStyle = `<style id="__phone_viewer_force_fill__">
        html{width:100%!important;min-width:100%!important;height:100%!important;margin:0!important;}
        body{width:100%!important;min-width:100%!important;min-height:100%!important;margin:0!important;padding-top:0!important;}
        body>.app,body>#app,body>.container,body>.wrapper,body>.page,body>main,body>section,body>div:first-child{width:100%!important;max-width:none!important;min-width:0!important;margin-left:0!important;margin-right:0!important;margin-top:0!important;}
      </style>`;
      const fillScript = `<script id="__phone_viewer_force_fill_script__">
        (function(){
          function forceFill(){
            document.documentElement.style.width='100%';
            document.documentElement.style.minWidth='100%';
            document.documentElement.style.margin='0';
            if(document.body){document.body.style.width='100%';document.body.style.minWidth='100%';document.body.style.margin='0';document.body.style.paddingTop='0';}
            const candidates=[document.getElementById('app'),document.querySelector('.app'),document.querySelector('.container'),document.querySelector('.wrapper'),document.querySelector('.page'),document.querySelector('main'),document.body&&document.body.firstElementChild].filter(Boolean);
            [...new Set(candidates)].forEach(el=>{el.style.width='100%';el.style.maxWidth='none';el.style.minWidth='0';el.style.marginLeft='0';el.style.marginRight='0';el.style.marginTop='0';});
          }
          forceFill(); window.addEventListener('DOMContentLoaded',forceFill); window.addEventListener('load',forceFill); setTimeout(forceFill,50); setTimeout(forceFill,250);
        })();
      <\/script>`;
      let output=sourceHtml;
      if(/<head[\s>]/i.test(output)) output=output.replace(/<head([^>]*)>/i,`<head$1>${fillStyle}`); else output=`${fillStyle}${output}`;
      if(/<\/body>/i.test(output)) output=output.replace(/<\/body>/i,`${fillScript}</body>`); else output+=fillScript;
      return output;
    }

    async function renderFile(file){
      if(!file || !/\.html?$/i.test(file.name)) return;
      const sourceHtml=await file.text();
      preview.srcdoc=injectFillCode(sourceHtml);
      refreshBtn.disabled=false;
    }

    async function openWithLiveHandle(){
      if(!window.showOpenFilePicker){ fileInput.click(); return; }
      try{
        const [handle]=await window.showOpenFilePicker({
          multiple:false,
          types:[{description:'HTML files',accept:{'text/html':['.html','.htm']}}]
        });
        liveFileHandle=handle;
        lastFile=await liveFileHandle.getFile();
        await renderFile(lastFile);
      }catch(error){}
    }

    async function refreshLatestFile(){
      if(liveFileHandle){
        lastFile=await liveFileHandle.getFile();
        await renderFile(lastFile);
        return;
      }
      if(lastFile) await renderFile(lastFile);
    }

    function loadDroppedOrInputFile(file){
      if(!file || !/\.html?$/i.test(file.name)) return;
      liveFileHandle=null;
      lastFile=file;
      renderFile(lastFile);
    }

    openBtn.addEventListener('click',openWithLiveHandle);
    refreshBtn.addEventListener('click',refreshLatestFile);
    fileInput.addEventListener('change',event=>{loadDroppedOrInputFile(event.target.files[0]);fileInput.value='';});
    function stopDefaults(event){event.preventDefault();event.stopPropagation();}
    ['dragenter','dragover','dragleave','drop'].forEach(eventName=>window.addEventListener(eventName,stopDefaults,false));
    ['dragenter','dragover'].forEach(eventName=>dropbox.addEventListener(eventName,()=>dropbox.classList.add('dragging')));
    ['dragleave','drop'].forEach(eventName=>dropbox.addEventListener(eventName,()=>dropbox.classList.remove('dragging')));
    dropbox.addEventListener('drop',event=>loadDroppedOrInputFile(event.dataTransfer.files[0]));
    window.addEventListener('drop',event=>loadDroppedOrInputFile(event.dataTransfer.files[0]));
    window.addEventListener('resize',fitPhoneViewport);
    fitPhoneViewport();
  </script>
</body>
</html>
